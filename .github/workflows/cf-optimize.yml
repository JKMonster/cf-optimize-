name: cf-optimize
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */3 * * *'

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 测试并更新
        id: main
        env:
          CF_TOKEN: ${{ secrets.CF_API_TOKEN }}
          ZID: ${{ secrets.CF_ZONE_ID }}
          DOM: ${{ secrets.CF_DOMAIN }}
        run: |
          IPS=("172.64.52.124" "162.159.58.65" "104.25.246.239" "172.64.32.126" "104.18.9.103" "104.16.88.12")
          BEST_IP=""
          BEST_LATENCY=9999
          RESULTS=""
          
          for ip in "${IPS[@]}"; do
            LATENCY=$(curl -s -o /dev/null -w "%{time_total}" --connect-timeout 3 "https://$ip" 2>/dev/null | awk '{printf "%.0f", $1 * 1000}')
            RESULTS="${RESULTS}${ip}: ${LATENCY}ms\n"
            echo "$ip: ${LATENCY}ms"
            if [ "$LATENCY" -lt "$BEST_LATENCY" ] 2>/dev/null; then
              BEST_LATENCY=$LATENCY
              BEST_IP=$ip
            fi
          done
          
          RID=$(curl -s "https://api.cloudflare.com/client/v4/zones/$ZID/dns_records?type=A&name=$DOM" -H "Authorization: Bearer $CF_TOKEN" | python3 -c "import sys,json;print(json.load(sys.stdin)['result'][0]['id'])" 2>/dev/null || echo "")
          
          if [ -n "$RID" ]; then
            curl -s -X PUT "https://api.cloudflare.com/client/v4/zones/$ZID/dns_records/$RID" -H "Authorization: Bearer $CF_TOKEN" -H "Content-Type: application/json" --data "{\"type\":\"A\",\"name\":\"$DOM\",\"content\":\"$BEST_IP\",\"ttl\":1,\"proxied\":false}"
          else
            curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$ZID/dns_records" -H "Authorization: Bearer $CF_TOKEN" -H "Content-Type: application/json" --data "{\"type\":\"A\",\"name\":\"$DOM\",\"content\":\"$BEST_IP\",\"ttl\":1,\"proxied\":false}"
          fi
          
          echo "BEST_IP=$BEST_IP" >> $GITHUB_OUTPUT
          echo "BEST_LATENCY=$BEST_LATENCY" >> $GITHUB_OUTPUT
          echo "RESULTS<<EOFRESULTS" >> $GITHUB_OUTPUT
          echo -e "$RESULTS" >> $GITHUB_OUTPUT
          echo "EOFRESULTS" >> $GITHUB_OUTPUT

      - name: 健康检查
        id: health
        run: |
          URLS=(
            "https://fakenewsfandai.ccwu.cc|CF反代面板"
            "https://fakenewsfandai.ccwu.cc/bb|Emby反代"
            "https://fakenewsfandai.ccwu.cc/nox|Nox反代"
            "https://361b7fa0.fakenewscf.pages.dev|edgetunnel"
          )
          
          STATUS=""
          ALL_OK=true
          
          for item in "${URLS[@]}"; do
            URL=$(echo "$item" | cut -d'|' -f1)
            NAME=$(echo "$item" | cut -d'|' -f2)
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 10 --max-time 15 "$URL" 2>/dev/null || echo "000")
            
            if [ "$HTTP_CODE" -ge 200 ] 2>/dev/null && [ "$HTTP_CODE" -lt 500 ] 2>/dev/null; then
              STATUS="${STATUS}✅ ${NAME}: ${HTTP_CODE}\n"
            else
              STATUS="${STATUS}❌ ${NAME}: ${HTTP_CODE}\n"
              ALL_OK=false
            fi
          done
          
          echo "ALL_OK=$ALL_OK" >> $GITHUB_OUTPUT
          echo "STATUS<<EOFSTATUS" >> $GITHUB_OUTPUT
          echo -e "$STATUS" >> $GITHUB_OUTPUT
          echo "EOFSTATUS" >> $GITHUB_OUTPUT

      - name: Telegram通知
        env:
          TG_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT_ID }}
        run: |
          ALL_OK="${{ steps.health.outputs.ALL_OK }}"
          
          if [ "$ALL_OK" = "true" ]; then
            TITLE="所有服务正常"
          else
            TITLE="有服务异常！"
          fi
          
          MSG="🚀 CF优选IP更新
          
最快IP: ${{ steps.main.outputs.BEST_IP }}
延迟: ${{ steps.main.outputs.BEST_LATENCY }}ms

各IP延迟:
${{ steps.main.outputs.RESULTS }}

健康检查:
${{ steps.health.outputs.STATUS }}

域名: ${{ secrets.CF_DOMAIN }}"

          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT}" \
            -d text="${MSG}"
