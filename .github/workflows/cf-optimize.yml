name: cf-optimize
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */3 * * *'
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 测试并更新
        id: main
        env:
          CF_TOKEN: ${{ secrets.CF_API_TOKEN }}
          ZID: ${{ secrets.CF_ZONE_ID }}
          DOM: ${{ secrets.CF_DOMAIN }}
        run: |
          IPS=("172.64.52.124" "162.159.58.65" "104.25.246.239" "172.64.32.126" "104.18.9.103" "104.16.88.12")
          BEST_IP=""
          BEST_LATENCY=9999
          RESULTS=""
          for ip in "${IPS[@]}"; do
            LATENCY=$(curl -s -o /dev/null -w "%{time_total}" --connect-timeout 3 "https://$ip" 2>/dev/null | awk '{printf "%.0f", $1 * 1000}')
            RESULTS="${RESULTS}${ip}: ${LATENCY}ms\n"
            if [ "$LATENCY" -lt "$BEST_LATENCY" ] 2>/dev/null; then
              BEST_LATENCY=$LATENCY
              BEST_IP=$ip
            fi
          done
          RID=$(curl -s "https://api.cloudflare.com/client/v4/zones/$ZID/dns_records?type=A&name=$DOM" \
            -H "Authorization: Bearer $CF_TOKEN" | python3 -c "import sys,json;print(json.load(sys.stdin)['result'][0]['id'])" 2>/dev/null || echo "")
          if [ -n "$RID" ]; then
            curl -s -X PUT "https://api.cloudflare.com/client/v4/zones/$ZID/dns_records/$RID" \
              -H "Authorization: Bearer $CF_TOKEN" -H "Content-Type: application/json" \
              --data "{\"type\":\"A\",\"name\":\"$DOM\",\"content\":\"$BEST_IP\",\"ttl\":1,\"proxied\":false}"
          else
            curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$ZID/dns_records" \
              -H "Authorization: Bearer $CF_TOKEN" -H "Content-Type: application/json" \
              --data "{\"type\":\"A\",\"name\":\"$DOM\",\"content\":\"$BEST_IP\",\"ttl\":1,\"proxied\":false}"
          fi
          echo "BEST_IP=$BEST_IP" >> $GITHUB_OUTPUT
          echo "BEST_LATENCY=$BEST_LATENCY" >> $GITHUB_OUTPUT

      - name: 健康检查
        id: health
        env:
          TG_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT_ID }}
        run: |
          URLS=("https://fakenewsfandai.ccwu.cc|CF反代面板"
                 "https://fakenewsfandai.ccwu.cc/bb|Emby反代"
                 "https://fakenewsfandai.ccwu.cc/nox|Nox反代"
                 "https://fakenewsfandai.ccwu.cc/cat|thecat"
                 "https://361b7fa0.fakenewscf.pages.dev|edgetunnel")
          STATUS=""
          ALL_OK=true
          for item in "${URLS[@]}"; do
            URL=$(echo "$item" | cut -d'|' -f1)
            NAME=$(echo "$item" | cut -d'|' -f2)
            # 一次 curl 同时拿状态码和延迟
            RESULT=$(curl -s -o /dev/null -w "%{http_code} %{time_total}" --connect-timeout 10 --max-time 15 "$URL" 2>/dev/null || echo "000 0")
            HTTP_CODE=$(echo "$RESULT" | awk '{print $1}')
            LATENCY=$(echo "$RESULT" | awk '{printf "%.0f", $2 * 1000}')
            if [ "$HTTP_CODE" -ge 200 ] 2>/dev/null && [ "$HTTP_CODE" -lt 500 ] 2>/dev/null; then
              STATUS="${STATUS}✅ ${NAME}: ${HTTP_CODE} | ${LATENCY}ms\n"
            else
              STATUS="${STATUS}❌ ${NAME}: ${HTTP_CODE} | ${LATENCY}ms\n"
              ALL_OK=false
            fi
          done
          if [ "$ALL_OK" = "true" ]; then
            TITLE="🟢 所有服务正常"
          else
            TITLE="🔴 有服务异常！"
          fi
          MSG="${TITLE}%0A%0A🚀 优选IP更新%0A✅ 最快IP: ${{ steps.main.outputs.BEST_IP }}%0A⚡ 延迟: ${{ steps.main.outputs.BEST_LATENCY }}ms%0A%0A🏥 健康检查:%0A$(echo -e "$STATUS" | sed 's/$/%0A/g' | tr -d '\n')%0A🌐 域名: ${{ secrets.CF_DOMAIN }}%0A🕐 $(date '+%Y-%m-%d %H:%M:%S')"
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" -d chat_id="${TG_CHAT}" -d text="${MSG}"
